<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Quản Lý Voucher | ShoeStore Professional</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --bg-body: #050505;
            --bg-card: #121212;
            --accent-red: #e50914;
            --accent-cyan: #00f2ff;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --border-glass: rgba(255, 255, 255, 0.08);
            --radius: 6px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        .admin-wrapper {
            display: flex;
            width: 100%;
        }

        .main-content {
            flex-grow: 1;
            margin-left: 260px;
            padding: 30px 40px;
            display: flex;
            flex-direction: column;
        }

        h1,
        h2,
        h3,
        .font-oswald {
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            padding: 25px;
            border-radius: var(--radius);
            margin-bottom: 30px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-size: 13px;
        }

        .form-input {
            width: 100%;
            background: #050505;
            border: 1px solid #333;
            padding: 12px;
            color: #fff;
            outline: none;
            border-radius: 4px;
            font-family: 'Poppins';
        }

        .form-input:focus {
            border-color: var(--accent-cyan);
        }

        .btn-neon {
            background: var(--accent-red);
            color: #fff;
            border: none;
            padding: 12px 25px;
            font-family: 'Oswald';
            cursor: pointer;
            text-transform: uppercase;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            transition: 0.3s;
        }

        .btn-neon:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            text-align: left;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            color: #666;
            font-family: 'Oswald';
            font-size: 12px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid var(--border-glass);
            vertical-align: middle;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-active {
            background: rgba(74, 222, 128, 0.1);
            color: #4ade80;
        }

        .badge-disabled {
            background: rgba(229, 9, 20, 0.1);
            color: var(--accent-red);
        }

        .rank-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            margin-right: 5px;
            border: 1px solid;
            font-weight: 700;
        }

        .action-btn {
            width: 35px;
            height: 35px;
            background: transparent;
            border: 1px solid #333;
            color: #888;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 4px;
            margin-left: 5px;
        }
    </style>
</head>

<body>
    <div class="admin-wrapper">
        <aside th:replace="~{admin/fragments/sidebar :: sidebar}"></aside>

        <div class="main-content">
            <header th:replace="~{admin/fragments/header :: header}"></header>

            <div style="margin-top: 20px; margin-bottom: 30px;">
                <span
                    style="font-size: 13px; color: var(--accent-cyan); font-weight: 600; letter-spacing: 2px;">PROMOTIONS
                    & DISCOUNTS</span>
                <h1 class="font-oswald" style="font-size: 32px;">QUẢN LÝ VOUCHER</h1>
            </div>

            <div th:if="${message}"
                style="background: rgba(74,222,128,0.1); color: #4ade80; padding: 15px; margin-bottom: 20px; border-left: 4px solid #4ade80;">
                <i class="bi bi-check-circle-fill"></i> <span th:text="${message}"></span>
            </div>

            <div th:if="${error}"
                style="background: rgba(229,9,20,0.1); color: var(--accent-red); padding: 15px; margin-bottom: 20px; border-left: 4px solid var(--accent-red);">
                <i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${error}"></span>
            </div>

            <!-- FORM THEM/SUA -->
            <div class="card">
                <h3 class="font-oswald" style="margin-bottom: 20px; color: var(--accent-cyan);">Thông tin Voucher</h3>
                <form th:action="@{/admin/promotions/save}" method="post">
                    <input type="hidden" name="id" id="vid">
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label">Mã Voucher</label>
                            <input type="text" name="code" id="vcode" class="form-input" placeholder="Ví dụ: GOLD2024"
                                required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Loại Giảm Giá</label>
                            <select name="discountType" id="vtype" class="form-input">
                                <option value="PERCENT">Phần trăm (%)</option>
                                <option value="FIXED">Số tiền cố định (đ)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Giá trị giảm</label>
                            <input type="number" name="discountValue" id="vval" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Đơn tối thiểu (đ)</label>
                            <input type="number" name="minOrderValue" id="vmin" class="form-input" value="0">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Giảm tối đa (đ)</label>
                            <input type="number" name="maxDiscount" id="vmax" class="form-input"
                                placeholder="Chỉ dúng cho %">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Số lượng</label>
                            <input type="number" name="quantity" id="vqty" class="form-input" value="100" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Ngày bắt đầu</label>
                            <input type="datetime-local" name="startDateStr" id="vstart" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Ngày kết thúc</label>
                            <input type="datetime-local" name="endDateStr" id="vend" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Trạng thái</label>
                            <select name="status" id="vstatus" class="form-input">
                                <option value="1">Hoạt động</option>
                                <option value="0">Tạm dừng</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group" style="margin-top: 20px;">
                        <label class="form-label">Hạng Thành Viên Được Áp Dụng (Để trống nếu áp dụng tất cả)</label>
                        <div
                            style="display: flex; flex-wrap: wrap; gap: 20px; background: rgba(255,255,255,0.02); padding: 20px; border: 1px solid #333; border-radius: 4px;">
                            <div th:each="r : ${ranks}"
                                style="display: flex; align-items: center; gap: 10px; min-width: 150px;">
                                <input type="checkbox" name="rankIds" th:value="${r.id}" class="rank-checkbox"
                                    style="width: 18px; height: 18px; cursor: pointer;">
                                <span th:text="${r.rankName}"
                                    th:style="'color: '+${r.colorCode}+'; font-weight: 600;'">Rank</span>
                            </div>
                        </div>
                    </div>

                    <div style="margin-top: 30px; display: flex; gap: 15px;">
                        <button type="submit" class="btn-neon">Lưu Voucher</button>
                        <button type="reset" class="btn-neon" style="background: transparent; border: 1px solid #333;"
                            onclick="resetVoucherForm()">Hủy / Làm mới</button>
                    </div>
                </form>
            </div>

            <!-- DANH SACH -->
            <div class="card" style="padding: 0; overflow: hidden;">
                <table>
                    <thead>
                        <tr>
                            <th>Mã</th>
                            <th>Giảm giá</th>
                            <th>Điều kiện</th>
                            <th>Hạng áp dụng</th>
                            <th>Số lượng</th>
                            <th>Thời hạn</th>
                            <th>Trạng thái</th>
                            <th style="text-align: right;">Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="v : ${list}">
                            <td><strong th:text="${v.code}"
                                    style="color: var(--accent-cyan); font-family: 'Oswald';">CODE</strong></td>
                            <td
                                th:text="${v.discountType == 'PERCENT' ? (v.discountValue + '%') : (#numbers.formatDecimal(v.discountValue, 0, 'COMMA', 0, 'POINT') + 'đ')}">
                            </td>
                            <td>
                                <div style="font-size: 11px; color: #888;">
                                    Đơn > <span
                                        th:text="${#numbers.formatDecimal(v.minOrderValue, 0, 'COMMA', 0, 'POINT')}"></span>đ
                                    <br th:if="${v.maxDiscount != null}">
                                    <span th:if="${v.maxDiscount != null}">Giảm tối đa: <span
                                            th:text="${#numbers.formatDecimal(v.maxDiscount, 0, 'COMMA', 0, 'POINT')}"></span>đ</span>
                                </div>
                            </td>
                            <td>
                                <span th:if="${#lists.isEmpty(v.applicableRanks)}"
                                    style="font-size: 10px; color: #666; text-transform: uppercase;">Tất cả hạng</span>
                                <span th:each="r : ${v.applicableRanks}" class="rank-tag" th:text="${r.rankName}"
                                    th:style="'color: '+${r.colorCode}+'; border-color: '+${r.colorCode}+'; background: '+${r.colorCode}+'1a'">Rank</span>
                            </td>
                            <td th:text="${v.quantity}" style="font-family: 'Oswald';">0</td>
                            <td>
                                <div style="font-size: 10px; color: #888;">
                                    Từ: <span
                                        th:text="${v.startDate != null ? #dates.format(v.startDate, 'dd/MM/yy HH:mm') : '---'}"></span><br>
                                    Đến: <span
                                        th:text="${v.endDate != null ? #dates.format(v.endDate, 'dd/MM/yy HH:mm') : '---'}"></span>
                                </div>
                            </td>
                            <td>
                                <span th:if="${v.status == 1}" class="badge badge-active">Hoạt động</span>
                                <span th:if="${v.status == 0}" class="badge badge-disabled">Tạm dừng</span>
                            </td>
                            <td style="text-align: right;">
                                <button class="action-btn" style="color: var(--accent-cyan);"
                                    th:onclick="editVoucher([[${v}]])">
                                    <i class="bi bi-pencil-square"></i>
                                </button>
                                <a th:href="@{/admin/promotions/delete/{id}(id=${v.id})}" class="action-btn"
                                    style="color: var(--accent-red);"
                                    onclick="return confirm('Bạn có chắc muốn xóa voucher này?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(list)}">
                            <td colspan="8" style="text-align: center; color: #666; padding: 40px;">Chưa có voucher nào
                                được tạo.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        function editVoucher(v) {
            document.getElementById('vid').value = v.id;
            document.getElementById('vcode').value = v.code;
            document.getElementById('vtype').value = v.discountType;
            document.getElementById('vval').value = v.discountValue;
            document.getElementById('vmin').value = v.minOrderValue;
            document.getElementById('vmax').value = v.maxDiscount;
            document.getElementById('vqty').value = v.quantity;
            document.getElementById('vstatus').value = v.status;

            if (v.startDate) {
                let d = new Date(v.startDate);
                d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
                document.getElementById('vstart').value = d.toISOString().slice(0, 16);
            } else {
                document.getElementById('vstart').value = '';
            }

            if (v.endDate) {
                let d = new Date(v.endDate);
                d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
                document.getElementById('vend').value = d.toISOString().slice(0, 16);
            } else {
                document.getElementById('vend').value = '';
            }

            const cbx = document.querySelectorAll('.rank-checkbox');
            cbx.forEach(c => c.checked = false);
            if (v.applicableRanks) {
                v.applicableRanks.forEach(rank => {
                    const c = document.querySelector(`.rank-checkbox[value="${rank.id}"]`);
                    if (c) c.checked = true;
                });
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetVoucherForm() {
            document.getElementById('vid').value = '';
            const cbx = document.querySelectorAll('.rank-checkbox');
            cbx.forEach(c => c.checked = false);
        }
    </script>
</body>

</html>
