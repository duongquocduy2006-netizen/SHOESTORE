<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Quản Lý Hạng Thành Viên | ShoeStore Professional</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --bg-body: #050505;
            --bg-card: #121212;
            --accent-red: #e50914;
            --accent-cyan: #00f2ff;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --border-glass: rgba(255, 255, 255, 0.08);
            --radius: 6px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            font-size: 14px;
            overflow-x: hidden;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        .font-oswald {
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .admin-wrapper {
            display: flex;
            min-height: 100vh;
        }

        .main-content {
            flex-grow: 1;
            margin-left: 260px;
            padding: 30px 40px;
            background-image: radial-gradient(circle at 80% 10%, rgba(0, 242, 255, 0.05) 0%, transparent 40%);
            display: flex;
            flex-direction: column;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 30px;
        }

        .page-title {
            font-size: 32px;
            font-weight: 700;
            margin: 0;
            line-height: 1;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .sub-title {
            font-size: 13px;
            color: var(--accent-cyan);
            font-weight: 600;
            letter-spacing: 2px;
            display: block;
            margin-bottom: 5px;
        }

        .btn-neon {
            background: var(--accent-cyan);
            color: #000;
            border: none;
            padding: 12px 25px;
            font-family: 'Oswald', sans-serif;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            font-weight: 600;
            text-decoration: none;
        }

        .btn-neon:hover {
            background: #fff;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
        }

        .toolbar {
            background: var(--bg-card);
            padding: 20px;
            border: 1px solid var(--border-glass);
            border-radius: var(--radius);
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 30px;
        }

        .search-box {
            flex-grow: 1;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            background: #050505;
            border: 1px solid #333;
            border-radius: 4px;
            color: #fff;
            outline: none;
            transition: 0.3s;
        }

        .search-input:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
        }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
        }

        .table-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 20px;
            font-weight: 500;
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Oswald';
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid #333;
        }

        td {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            vertical-align: middle;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .item-id {
            font-family: 'Oswald';
            color: var(--accent-cyan);
            letter-spacing: 1px;
            font-weight: 600;
        }

        .points-badge {
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 12px;
            border-radius: 20px;
            font-family: 'Oswald';
            color: #fff;
            font-size: 12px;
            border: 1px solid var(--border-glass);
        }

        .action-btn {
            width: 35px;
            height: 35px;
            background: transparent;
            border: 1px solid #333;
            color: #888;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            margin-left: 5px;
            border-radius: 4px;
            text-decoration: none;
        }

        .btn-edit:hover {
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
        }

        .btn-delete:hover {
            border-color: var(--accent-red);
            color: var(--accent-red);
            box-shadow: 0 0 10px rgba(229, 9, 20, 0.3);
        }
    </style>
</head>

<body>
    <div class="admin-wrapper">
        <aside th:replace="~{admin/fragments/sidebar :: sidebar}"></aside>
        <div class="main-content">
            <header th:replace="~{admin/fragments/header :: header}"></header>

            <div class="page-header" style="margin-top: 20px;">
                <div>
                    <span class="sub-title"><i class="bi bi-star"></i> MEMBERSHIP</span>
                    <h1 class="page-title font-oswald">QUẢN LÝ HẠNG THÀNH VIÊN</h1>
                </div>
                <a th:href="@{/admin/ranks/add}" class="btn-neon">
                    <i class="bi bi-plus-lg"></i> Thêm Hạng Mới
                </a>
            </div>

            <!-- ALERT MESSAGES -->
            <div th:if="${message}"
                style="background: rgba(74, 222, 128, 0.1); border: 1px solid #4ade80; color: #4ade80; padding: 15px; border-radius: 4px; margin-bottom: 20px; font-family: 'Poppins'; font-size: 13px; display: flex; align-items: center; gap: 10px;">
                <i class="bi bi-check-circle-fill"></i>
                <span th:text="${message}">Thông báo thành công</span>
            </div>
            <div th:if="${error}"
                style="background: rgba(229, 9, 20, 0.1); border: 1px solid var(--accent-red); color: var(--accent-red); padding: 15px; border-radius: 4px; margin-bottom: 20px; font-family: 'Poppins'; font-size: 13px; display: flex; align-items: center; gap: 10px;">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span th:text="${error}">Thông báo lỗi</span>
            </div>

            <div class="toolbar">
                <div class="search-box">
                    <i class="bi bi-search search-icon"></i>
                    <input type="text" class="search-input" placeholder="Tìm kiếm hạng thành viên...">
                </div>
            </div>

            <div class="table-card">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 100px;">ID</th>
                            <th>Tên hạng</th>
                            <th>Điểm tối thiểu</th>
                            <th style="text-align: right;">Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="r : ${list}">
                            <td class="item-id" th:text="${'#RNK-' + r.id}">#RNK-01</td>
                            <td>
                                <span class="tier-badge"
                                    th:style="'color: ' + ${r.colorCode} + '; border-color: ' + ${r.colorCode} + '; background: ' + ${r.colorCode} + '1a; padding: 4px 10px; border: 2px solid; border-radius: 4px; font-weight: 700; font-size: 11px; text-transform: uppercase;'">
                                    <i class="bi bi-star-fill"></i>
                                    <span th:text="${r.rankName}">Tên Hạng</span>
                                </span>
                            </td>
                            <td>
                                <span class="points-badge"
                                    th:text="${#numbers.formatDecimal(r.minPoints, 0, 'COMMA', 0, 'POINT') + ' điểm'}">0
                                    điểm</span>
                            </td>
                            <td style="text-align: right;">
                                <a th:href="@{/admin/ranks/edit/{id}(id=${r.id})}" class="action-btn btn-edit"
                                    title="Sửa">
                                    <i class="bi bi-pencil-square"></i>
                                </a>
                                <a th:href="@{/admin/ranks/delete/{id}(id=${r.id})}"
                                    onclick="return confirm('Bạn có chắc chắn muốn xóa hạng này?')"
                                    class="action-btn btn-delete" title="Xóa">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(list)}">
                            <td colspan="4" style="text-align: center; padding: 30px; color: #888;">
                                Chưa có hạng thành viên nào.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>

</html>
