<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Đặt hàng thành công | ShoeStore</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --accent-green: #00ff88;
            --text-main: #ffffff;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .success-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 50px;
            text-align: center;
            max-width: 600px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .success-icon {
            font-size: 80px;
            color: var(--accent-green);
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            margin-bottom: 20px;
        }

        p {
            color: #ccc;
            margin-bottom: 40px;
        }

        .btn-home {
            background: var(--text-main);
            color: black;
            padding: 12px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            transition: all 0.3s;
        }

        .btn-home:hover {
            background: #ccc;
            transform: scale(1.05);
        }
    </style>
</head>

<body>
    <div class="success-card animate__animated animate__zoomIn">
        <div class="success-icon animate__animated animate__bounceInDown animate__delay-1s">
            <i class="fa fa-circle-check"></i>
        </div>
        <h2>ĐẶT HÀNG THÀNH CÔNG!</h2>
        <p>Cảm ơn Xếp đã tin tưởng ShoeStore. Đơn hàng của Xếp đang được hệ thống xử lý và sẽ sớm được giao tới địa chỉ
            yêu cầu.</p>
        <a href="/" class="btn-home">TIẾP TỤC MUA SẮM</a>
    </div>
</body>

</html>
