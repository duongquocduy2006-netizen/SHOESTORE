<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Sản Phẩm Yêu Thích | ShoeStore</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <style>
        :root {
            --bg-body: #050505;
            --card-bg: #121212;
            --accent-red: #e50914;
            --accent-cyan: #00f2ff;
            --text-main: #ffffff;
            --border-glass: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
        }

        .page-header {
            padding: 80px 0 40px;
            background: linear-gradient(to bottom, #111, var(--bg-body));
            text-align: center;
        }

        .page-title {
            font-family: 'Oswald', sans-serif;
            font-size: 48px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Product Card Styles */
        .product-card {
            background: var(--card-bg);
            border: 1px solid var(--border-glass);
            border-radius: 8px;
            overflow: hidden;
            transition: 0.4s;
            height: 100%;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: #444;
        }

        .card-img-box {
            position: relative;
            padding-top: 100%;
            background: #1a1a1a;
            overflow: hidden;
        }

        .card-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.6s ease;
        }

        .product-card:hover .card-img {
            transform: scale(1.1);
            opacity: 0.8;
        }

        .card-info {
            padding: 15px;
        }

        .card-brand {
            font-size: 11px;
            color: var(--accent-cyan);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .card-title {
            font-family: 'Oswald', sans-serif;
            font-size: 18px;
            margin: 5px 0;
            color: #fff;
            text-decoration: none;
            display: block;
        }

        .card-price {
            font-weight: 600;
            color: #fff;
        }

        .remove-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 35px;
            height: 35px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .remove-btn:hover {
            background: var(--accent-red);
            transform: scale(1.1);
        }

        .empty-state {
            padding: 100px 0;
            text-align: center;
        }
    </style>
</head>

<body>
    <div th:replace="~{client/fragments/header :: header}"></div>

    <div class="page-header animate__animated animate__fadeIn">
        <div class="container">
            <h1 class="page-title">Sản Phẩm Yêu Thích</h1>
            <p class="text-muted">Danh sách những món đồ Xếp đã nhắm tới</p>
        </div>
    </div>

    <div class="container py-5">
        <div class="row g-4" th:if="${not #lists.isEmpty(products)}">
            <div th:each="p : ${products}" class="col-6 col-md-4 col-lg-3 animate__animated animate__fadeInUp">
                <div class="product-card">
                    <div class="remove-btn" title="Xóa khỏi yêu thích"
                        th:onclick="'toggleWishlist(' + ${p.id} + ', this)'">
                        <i class="fa fa-times"></i>
                    </div>
                    <div class="card-img-box">
                        <img th:src="${p.image_url != null ? p.image_url : 'https://placehold.co/400x400?text=No+Image'}"
                            class="card-img">
                        <a th:href="@{/details(id=${p.id})}" class="stretched-link"></a>
                    </div>
                    <div class="card-info">
                        <span class="card-brand" th:text="${p.brand_name}">Nike</span>
                        <a th:href="@{/details(id=${p.id})}" class="card-title" th:text="${p.product_name}">Sản phẩm</a>
                        <div class="card-price"
                            th:text="${p.min_price != null ? #numbers.formatDecimal(p.min_price, 0, 'POINT', 0, 'POINT') + '₫' : 'Liên hệ'}">
                            0₫</div>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(products)}" class="empty-state animate__animated animate__fadeIn">
            <i class="fa fa-heart-broken fa-4x text-muted mb-4"></i>
            <h3>Chưa có sản phẩm nào</h3>
            <p class="text-muted mb-4">Dạo một vòng cửa hàng để tìm món quà ưng ý cho mình đi Xếp!</p>
            <a th:href="@{/shop}" class="btn btn-outline-light rounded-0 px-5 py-3">ĐI MUA SẮM NGAY</a>
        </div>
    </div>

    <div th:replace="~{client/fragments/footer :: footer}"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        function toggleWishlist(productId, btn) {
            $.post('/favourites/toggle', { productId: productId }, function (res) {
                if (res.success) {
                    if (res.status === 'removed') {
                        // Nếu đang ở trang favourites thì xóa thẻ đó đi
                        $(btn).closest('.col-6').fadeOut(300, function () {
                            $(this).remove();
                            if ($('.product-card').length === 0) {
                                location.reload(); // Hiển thị empty state
                            }
                        });
                    }
                } else if (res.message === 'Chưa đăng nhập') {
                    location.href = '/login';
                }
            });
        }
    </script>
</body>

</html>
