<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Thêm Thương Hiệu | ShoeStore Professional</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --bg-body: #050505;
            --bg-card: #121212;
            --accent-red: #e50914;
            --accent-cyan: #00f2ff;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --border-glass: rgba(255, 255, 255, 0.08);
            --radius: 6px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            font-size: 14px;
            overflow-x: hidden;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        .font-oswald {
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .admin-wrapper {
            display: flex;
            min-height: 100vh;
        }

        .main-content {
            flex-grow: 1;
            margin-left: 260px;
            padding: 30px 40px;
            background-image: radial-gradient(circle at 80% 10%, rgba(0, 242, 255, 0.05) 0%, transparent 40%);
            display: flex;
            flex-direction: column;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 30px;
            margin-top: 20px;
        }

        .page-title {
            font-size: 32px;
            font-weight: 700;
            margin: 0;
            line-height: 1;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .sub-title {
            font-size: 13px;
            color: var(--accent-cyan);
            font-weight: 600;
            letter-spacing: 2px;
            display: block;
            margin-bottom: 5px;
        }

        .card-form {
            background: var(--bg-card);
            padding: 40px;
            border: 1px solid var(--border-glass);
            border-radius: var(--radius);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
            max-width: 800px;
            width: 100%;
        }

        .form-header {
            margin-bottom: 30px;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
        }

        .form-header h2 {
            font-size: 20px;
            color: var(--text-main);
            margin-bottom: 5px;
        }

        .form-header p {
            color: var(--text-muted);
            font-size: 13px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 500;
            color: var(--text-muted);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-control {
            width: 100%;
            padding: 14px 15px;
            background: #050505;
            border: 1px solid #333;
            border-radius: 4px;
            color: #fff;
            outline: none;
            transition: 0.3s;
            font-family: 'Poppins';
        }

        .form-control:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 40px;
        }

        .btn-neon {
            background: var(--accent-cyan);
            color: #000;
            border: none;
            padding: 14px 30px;
            font-family: 'Oswald', sans-serif;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            font-weight: 600;
            text-decoration: none;
            font-size: 15px;
            flex: 1;
        }

        .btn-neon:hover {
            background: #fff;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
        }

        .btn-back {
            background: transparent;
            color: #fff;
            border: 1px solid #333;
            padding: 14px 30px;
            font-family: 'Oswald', sans-serif;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            font-weight: 500;
            border-radius: 4px;
            flex: 1;
        }

        .btn-back:hover {
            border-color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        .alert-success {
            background: rgba(74, 222, 128, 0.1);
            color: #4ade80;
            border: 1px solid rgba(74, 222, 128, 0.3);
            padding: 15px 20px;
            border-radius: 4px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            max-width: 800px;
        }
    </style>
</head>

<body>
    <div class="admin-wrapper">
        <aside th:replace="~{admin/fragments/sidebar :: sidebar}"></aside>
        <div class="main-content">
            <header th:replace="~{admin/fragments/header :: header}"></header>

            <div class="page-header">
                <div>
                    <span class="sub-title"><i class="bi bi-award"></i> QUẢN LÝ THƯƠNG HIỆU</span>
                    <h1 class="page-title font-oswald">THÊM MỚI</h1>
                </div>
            </div>

            <div th:if="${message}" class="alert-success">
                <i class="bi bi-check-circle-fill"></i> <span th:text="${message}"></span>
            </div>

            <div class="card-form">
                <div class="form-header">
                    <h2 class="font-oswald">Thông Tin Thương Hiệu</h2>
                    <p>Vui lòng nhập tên hãng giày mới.</p>
                </div>

                <form th:action="@{/admin/brands/add}" th:object="${brand}" method="post">
                    <div class="form-group">
                        <label><i class="bi bi-award"></i> Tên thương hiệu</label>
                        <input type="text" th:field="*{name}" class="form-control"
                            placeholder="Ví dụ: Nike, Adidas, Li-Ning..." required>
                    </div>

                    <div class="form-group">
                        <label><i class="bi bi-eye"></i> Trạng thái hoạt động</label>
                        <select th:field="*{active}" class="form-control">
                            <option th:value="true">Đang hoạt động</option>
                            <option th:value="false">Tạm khóa</option>
                        </select>
                    </div>

                    <div class="btn-group">
                        <a th:href="@{/admin/brands}" class="btn-back">
                            <i class="bi bi-arrow-left"></i> HỦY BỎ
                        </a>
                        <button type="submit" class="btn-neon">
                            <i class="bi bi-save"></i> LƯU THƯƠNG HIỆU
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
